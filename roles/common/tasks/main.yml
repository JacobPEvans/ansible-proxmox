---
# Common role tasks

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags:
    - common
    - packages

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
  tags:
    - common
    - packages

- name: Create systemd override directories for common services
  ansible.builtin.file:
    path: "/etc/systemd/system/{{ item }}.service.d"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - docker
    - rasdaemon
    - lm-sensors
  tags:
    - common
    - services

- name: Configure restart policies for common services
  ansible.builtin.copy:
    content: |
      [Service]
      Restart=on-failure
      RestartSec=5s
    dest: "/etc/systemd/system/{{ item }}.service.d/restart-policy.conf"
    owner: root
    group: root
    mode: "0644"
  loop:
    - docker
    - rasdaemon
    - lm-sensors
  notify: Reload systemd daemon
  tags:
    - common
    - services

- name: Enable rasdaemon service
  ansible.builtin.systemd:
    name: rasdaemon
    enabled: true
    state: started
  tags:
    - common
    - services

- name: Enable lm-sensors service
  ansible.builtin.systemd:
    name: lm-sensors
    enabled: true
    state: started
  tags:
    - common
    - services
