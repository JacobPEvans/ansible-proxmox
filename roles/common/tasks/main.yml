---
# Common role tasks

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  tags:
    - common
    - packages

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
  tags:
    - common
    - packages

- name: Create docker systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/docker.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - common
    - services

- name: Configure docker restart policy
  ansible.builtin.copy:
    content: |
      [Service]
      Restart=on-failure
      RestartSec=5s
    dest: /etc/systemd/system/docker.service.d/restart-policy.conf
    owner: root
    group: root
    mode: "0644"
  tags:
    - common
    - services

- name: Create rasdaemon systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/rasdaemon.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - common
    - services

- name: Configure rasdaemon restart policy
  ansible.builtin.copy:
    content: |
      [Service]
      Restart=on-failure
      RestartSec=5s
    dest: /etc/systemd/system/rasdaemon.service.d/restart-policy.conf
    owner: root
    group: root
    mode: "0644"
  tags:
    - common
    - services

- name: Create lm-sensors systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/lm-sensors.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - common
    - services

- name: Configure lm-sensors restart policy
  ansible.builtin.copy:
    content: |
      [Service]
      Restart=on-failure
      RestartSec=5s
    dest: /etc/systemd/system/lm-sensors.service.d/restart-policy.conf
    owner: root
    group: root
    mode: "0644"
  tags:
    - common
    - services

- name: Enable rasdaemon service
  ansible.builtin.systemd:
    name: rasdaemon
    enabled: true
    state: started
  tags:
    - common
    - services

- name: Enable lm-sensors service
  ansible.builtin.systemd:
    name: lm-sensors
    enabled: true
    state: started
  tags:
    - common
    - services
