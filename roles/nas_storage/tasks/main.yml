---
# NAS Storage role tasks
# Provisions a ZFS dataset and Samba share on the Proxmox host.
# ZFS and systemd tasks are skipped in Docker containers (molecule testing).

# ============================================================
# ZFS Dataset
# ============================================================

- name: Check if ZFS dataset exists
  ansible.builtin.command:
    cmd: "zfs list {{ nas_storage_zfs_dataset }}"
  register: nas_storage_zfs_check
  changed_when: false
  failed_when: false
  when: ansible_virtualization_type != 'docker'
  tags:
    - nas_storage
    - nas_storage_zfs

- name: Create ZFS dataset
  ansible.builtin.command:
    cmd: >-
      zfs create -o mountpoint={{ nas_storage_mount_point }}
      {{ nas_storage_zfs_dataset }}
  when:
    - ansible_virtualization_type != 'docker'
    - nas_storage_zfs_check.rc != 0
  changed_when: true
  tags:
    - nas_storage
    - nas_storage_zfs

- name: Get current ZFS mountpoint
  ansible.builtin.command:
    cmd: "zfs get -H -o value mountpoint {{ nas_storage_zfs_dataset }}"
  register: nas_storage_zfs_current_mountpoint
  changed_when: false
  when:
    - ansible_virtualization_type != 'docker'
    - nas_storage_zfs_check.rc == 0
  tags:
    - nas_storage
    - nas_storage_zfs

- name: Fix ZFS mountpoint drift
  ansible.builtin.command:
    cmd: "zfs set mountpoint={{ nas_storage_mount_point }} {{ nas_storage_zfs_dataset }}"
  when:
    - ansible_virtualization_type != 'docker'
    - nas_storage_zfs_check.rc == 0
    - nas_storage_zfs_current_mountpoint.stdout != nas_storage_mount_point
  changed_when: true
  tags:
    - nas_storage
    - nas_storage_zfs

# Quota values must use ZFS canonical format (e.g., 1T not 1024G)
- name: Get current ZFS quota
  ansible.builtin.command:
    cmd: "zfs get -Hp -o value quota {{ nas_storage_zfs_dataset }}"
  register: nas_storage_zfs_current_quota
  changed_when: false
  when: ansible_virtualization_type != 'docker'
  tags:
    - nas_storage
    - nas_storage_zfs

- name: Set ZFS quota
  ansible.builtin.command:
    cmd: "zfs set quota={{ nas_storage_zfs_quota }} {{ nas_storage_zfs_dataset }}"
  when:
    - ansible_virtualization_type != 'docker'
    - nas_storage_zfs_current_quota.stdout | default('') != nas_storage_zfs_quota
  changed_when: true
  tags:
    - nas_storage
    - nas_storage_zfs

# ============================================================
# Samba group (must exist before directory creation)
# ============================================================

- name: Create nas group
  ansible.builtin.group:
    name: nas
    state: present
  tags:
    - nas_storage
    - nas_storage_samba

# ============================================================
# Subdirectories
# ============================================================

- name: Create NAS subdirectories
  ansible.builtin.file:
    path: "{{ nas_storage_mount_point }}/{{ item }}"
    state: directory
    owner: root
    group: nas
    mode: "0775"
  loop: "{{ nas_storage_directories }}"
  when: ansible_virtualization_type != 'docker'
  tags:
    - nas_storage

# ============================================================
# Samba installation and configuration
# ============================================================

- name: Install Samba
  ansible.builtin.apt:
    name: samba
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags:
    - nas_storage
    - nas_storage_samba

- name: Create Samba include directory
  ansible.builtin.file:
    path: /etc/samba/smb.conf.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - nas_storage
    - nas_storage_samba

- name: Template smb.conf
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    owner: root
    group: root
    mode: "0644"
    # Wrap in `sh -c` because Ansible's validate runs via shlex.split (no shell),
    # so a bare `testparm -s %s 2>/dev/null` would treat `2>/dev/null` as a
    # positional hostname argument and fail with
    # "ERROR: You must specify both a machine name and an IP address."
    validate: 'sh -c "testparm -s %s 2>/dev/null"'
  notify: Restart smbd
  tags:
    - nas_storage
    - nas_storage_samba

- name: Template nas share configuration
  ansible.builtin.template:
    src: nas.conf.j2
    dest: /etc/samba/smb.conf.d/nas.conf
    owner: root
    group: root
    mode: "0644"
    # Wrap in `sh -c` because Ansible's validate runs via shlex.split (no shell),
    # so a bare `testparm -s %s 2>/dev/null` would treat `2>/dev/null` as a
    # positional hostname argument and fail with
    # "ERROR: You must specify both a machine name and an IP address."
    validate: 'sh -c "testparm -s %s 2>/dev/null"'
  notify: Restart smbd
  tags:
    - nas_storage
    - nas_storage_samba

- name: Enable and start smbd
  ansible.builtin.systemd:
    name: smbd
    enabled: true
    state: started
  when: ansible_virtualization_type != 'docker'
  tags:
    - nas_storage
    - nas_storage_samba
