name: CI Fix (Claude)

on:
  workflow_run:
    workflows: ["Ansible Lint"]
    types: [completed]

permissions:
  actions: read
  contents: write
  id-token: write
  issues: write
  pull-requests: write

concurrency:
  group: ci-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  fix:
    if: >-
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    uses: JacobPEvans/ai-workflows/.github/workflows/ci-fix.yml@v0.9.1
    with:
      repo_context: "Ansible playbooks and roles for configuring Proxmox VE host"
      ci_structure: "ansible-lint.yml (Ansible Lint checks) + molecule.yml (Molecule Test integration tests)"
    secrets: inherit
